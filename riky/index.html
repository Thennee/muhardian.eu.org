<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhardian 2026</title>
    <style>
        :root {
            --bg-dark: #050b18;
            --bg-card: rgba(22, 30, 45, 0.8);
            --accent-blue: #00d2ff;
            --text-main: #e2e8f0;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: radial-gradient(circle at top right, #101e3a, #050b18);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header & Logo */
        header {
            padding: 15px 5%;
            background: rgba(5, 11, 24, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo-container img {
            height: 45px;
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .logo-container a:hover img {
            transform: scale(1.1) rotate(-5deg);
        }

        /* Container Card */
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            max-width: 750px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            animation: fadeIn 0.8s ease-out;
        }

        /* Konten & Alinea */
        .content-text p {
            text-indent: 40px; /* Membuat Alinea */
            margin-bottom: 2em; /* Jarak 2 baris antar paragraf */
            line-height: 1.8;
            color: var(--text-dim);
        }

        /* More Text Rata Kanan Kiri */
        #more-text {
            display: none;
            text-align: justify; /* Rata Kanan Kiri */
            hyphens: auto;
        }

        .read-more-btn {
            color: var(--accent-blue);
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            margin-top: -10px;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .read-more-btn:hover {
            text-shadow: 0 0 10px var(--accent-blue);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--glass-border);
            padding-top: 25px;
        }

        .btn-small {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 13px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-inventory { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }
        .btn-report { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .btn-small:hover {
            transform: translateY(-2px);
            filter: brightness(1.3);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        /* Footer Samar */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 10px;
            color: rgba(148, 163, 184, 0.2);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        footer:hover {
            color: var(--accent-blue);
            text-shadow: 0 0 8px var(--accent-blue);
            transition: 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive Mobile */
        @media (max-width: 600px) {
            .card { padding: 25px; }
            .content-text p { text-indent: 25px; margin-bottom: 1.5em; }
            header { text-align: left; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <a href="https://muhardian.eu.org/riky/full-logo.png" target="_blank">
                <img src="logo.png" alt="Logo">
            </a>
        </div>
    </header>

    <div class="main-wrapper">
        <div class="card">
            <h2 style="margin-bottom: 25px; color: #fff;"></h2>
            
            <div class="content-text">
               
                
                <div id="more-text">
                   




                    
                </div>
                
                <span class="read-more-btn" id="toggle-btn" onclick="showMore()">Baca Selengkapnya...</span>
            </div>

            <div class="button-group">
                <a href="https://muhardian.eu.org/riky/inv" class="btn-small btn-inventory">📦 Input </a>
                <a href="https://muhardian.eu.org/riky/rpt/" class="btn-small btn-report">⚠️ Report</a>
                <a href="https://muhardian.eu.org/riky/rpt/sum.html" class="btn-small btn-summary">📊 Summary</a>


                
            </div>
        </div>
    </div>

  <footer>
        <a href="https://muhardian.eu.org/scan/deni/" class="footer-link" target="_blank">
            Muhardian @2026
        </a>
    </footer>

    <script>
        function showMore() {
            var moreText = document.getElementById("more-text");
            var btnText = document.getElementById("toggle-btn");

            if (moreText.style.display === "block") {
                moreText.style.display = "none";
                btnText.innerHTML = "Baca Selengkapnya...";
            } else {
                moreText.style.display = "block";
                btnText.innerHTML = "Tampilkan Lebih Sedikit";
            }
        }
    </script>

</body>
</html>
