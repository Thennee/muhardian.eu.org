<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Neon Red Glow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');

        :root {
            --neon-red: #ff003c;
            --dark-red: #2a0008;
            --bg-dark: #0a0a0a;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0;
            overflow-x: hidden;
        }

        .calculator-card {
            background: linear-gradient(145deg, #1a0005, #0a0a0a);
            border: 2px solid rgba(255, 0, 60, 0.3);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.15), 
                        inset 0 0 15px rgba(255, 0, 60, 0.05);
            border-radius: 2.5rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(10px);
        }

        .display-container {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 0, 60, 0.4);
            border-radius: 1.25rem;
            padding: 1.75rem;
            margin-bottom: 2rem;
            text-align: right;
            box-shadow: inset 0 0 20px rgba(255, 0, 60, 0.15);
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        #prev-op {
            color: rgba(255, 0, 60, 0.7);
            font-size: 1.1rem;
            height: 1.5rem;
            overflow: hidden;
            margin-bottom: 0.5rem;
        }

        #current-op {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            color: var(--neon-red);
            text-shadow: 0 0 15px rgba(255, 0, 60, 0.7);
            overflow: hidden;
            white-space: nowrap;
            line-height: 1;
        }

        .calc-btn {
            background: rgba(42, 0, 8, 0.6);
            border: 1px solid rgba(255, 0, 60, 0.2);
            color: #eeeeee;
            border-radius: 1rem;
            padding: 1.25rem 0.5rem;
            font-weight: 700;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            font-family: 'Inter', sans-serif;
        }

        .calc-btn:hover {
            background: rgba(255, 0, 60, 0.2);
            border-color: var(--neon-red);
            color: #fff;
            box-shadow: 0 0 20px rgba(255, 0, 60, 0.4);
            transform: scale(1.05);
        }

        .calc-btn:active {
            transform: scale(0.95);
        }

        .btn-op {
            color: var(--neon-red);
            font-size: 2rem;
        }

        .btn-eq {
            background: var(--neon-red);
            color: #fff;
            border: none;
            box-shadow: 0 0 25px rgba(255, 0, 60, 0.5);
            font-size: 2.25rem;
        }

        .btn-eq:hover {
            background: #ff2b5a;
            box-shadow: 0 0 35px rgba(255, 0, 60, 0.7);
        }

        .btn-clear {
            color: #ff9900;
            font-size: 1.5rem;
        }

        .home-btn {
            margin-top: 2.5rem;
            padding: 1rem 2.5rem;
            border: 2px solid var(--neon-red);
            border-radius: 9999px;
            color: var(--neon-red);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .home-btn:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 25px rgba(255, 0, 60, 0.5);
        }

        footer {
            margin-top: 3.5rem;
            padding-bottom: 2.5rem;
        }

        footer a {
            color: rgba(255, 255, 255, 0.3);
            font-size: 0.9rem;
            text-decoration: none;
            transition: color 0.3s ease;
            letter-spacing: 0.1em;
        }

        footer a:hover {
            color: var(--neon-red);
        }
        
        .glow-line {
            height: 2px;
            width: 150px;
            background: linear-gradient(90deg, transparent, var(--neon-red), transparent);
            margin: 1.5rem auto;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <div class="mb-6 flex items-center justify-between px-2">
            <span class="text-sm font-bold uppercase tracking-widest text-red-800">Muhardian Project - Calc Pro</span>
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-red-900"></div>
                <div class="w-3 h-3 rounded-full bg-red-700"></div>
                <div class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
            </div>
        </div>

        <div class="display-container">
            <div id="prev-op"></div>
            <div id="current-op">0</div>
        </div>

        <div class="grid grid-cols-4 gap-4">
            <!-- Baris 1 -->
            <button class="calc-btn btn-clear" onclick="clearDisplay()">AC</button>
            <button class="calc-btn btn-op" onclick="appendOperator('/')">÷</button>
            <button class="calc-btn btn-op" onclick="appendOperator('*')">×</button>
            <button class="calc-btn btn-op" onclick="deleteLast()">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
            </button>
            
            <!-- Baris 2 -->
            <button class="calc-btn" onclick="appendNumber('7')">7</button>
            <button class="calc-btn" onclick="appendNumber('8')">8</button>
            <button class="calc-btn" onclick="appendNumber('9')">9</button>
            <button class="calc-btn btn-op" onclick="appendOperator('-')">−</button>
            
            <!-- Baris 3 -->
            <button class="calc-btn" onclick="appendNumber('4')">4</button>
            <button class="calc-btn" onclick="appendNumber('5')">5</button>
            <button class="calc-btn" onclick="appendNumber('6')">6</button>
            <button class="calc-btn btn-op" onclick="calculateSqrt()">√</button>
            
            <!-- Baris 4 -->
            <button class="calc-btn" onclick="appendNumber('1')">1</button>
            <button class="calc-btn" onclick="appendNumber('2')">2</button>
            <button class="calc-btn" onclick="appendNumber('3')">3</button>
            <button class="calc-btn btn-op" onclick="appendOperator('+')">+</button>
            
            <!-- Baris 5 -->
            <button class="calc-btn" onclick="appendNumber('0')">0</button>
            <button class="calc-btn" onclick="appendNumber(',')">,</button>
            <button class="calc-btn col-span-2 btn-eq" onclick="calculateResult()">=</button>
        </div>
    </div>

    <!-- Tombol Home -->
    <a href="https://muhardian.eu.org/deni" class="home-btn">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Kembali ke Home
    </a>

    <div class="glow-line"></div>

    <!-- Footer -->
    <footer>
        <a href="https://muharidian.eu.org">@muhariadian2026</a>
    </footer>

    <!-- Audio Element -->
    <audio id="coinSound" src="https://muhardian.eu.org/deni/mario/coin.mp3" preload="auto"></audio>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let shouldResetScreen = false;
        
        let lastOperand = null;
        let lastOperator = null;

        const currentOpDisplay = document.getElementById('current-op');
        const prevOpDisplay = document.getElementById('prev-op');
        const coinSound = document.getElementById('coinSound');

        function playCoinSound() {
            coinSound.currentTime = 0;
            coinSound.play().catch(error => console.log("Audio failed:", error));
        }

        function formatDisplay(value) {
            if (value === "Error" || value === "Div by 0") return value;
            let num = parseFloat(value);
            if (isNaN(num)) return value;
            return num.toLocaleString('id-ID', { maximumFractionDigits: 3 });
        }

        function updateDisplay() {
            currentOpDisplay.innerText = formatDisplay(currentInput);
            prevOpDisplay.innerText = previousInput;
            
            if (currentInput.length > 8) {
                currentOpDisplay.style.fontSize = '2rem';
            } else if (currentInput.length > 6) {
                currentOpDisplay.style.fontSize = '2.5rem';
            } else {
                currentOpDisplay.style.fontSize = '3rem';
            }
        }

        function appendNumber(number) {
            const input = number === ',' ? '.' : number;

            if (currentInput === '0' || shouldResetScreen) {
                currentInput = input === '.' ? '0.' : input;
                shouldResetScreen = false;
            } else {
                if (input === '.' && currentInput.includes('.')) return;
                currentInput += input;
            }
            lastOperand = null;
            lastOperator = null;
            updateDisplay();
        }

        function appendOperator(op) {
            if (operator !== null) calculateResult(false);
            previousInput = formatDisplay(currentInput) + ' ' + op;
            operator = op;
            shouldResetScreen = true;
            lastOperand = null;
            lastOperator = null;
            updateDisplay();
        }

        function clearDisplay() {
            playCoinSound();
            currentInput = '0';
            previousInput = '';
            operator = null;
            lastOperand = null;
            lastOperator = null;
            updateDisplay();
        }

        function deleteLast() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            updateDisplay();
        }

        function calculateSqrt() {
            const val = parseFloat(currentInput);
            if (val < 0) {
                currentInput = "Error";
            } else {
                currentInput = Math.sqrt(val).toString();
            }
            operator = null;
            previousInput = `√(${formatDisplay(val)})`;
            shouldResetScreen = true;
            updateDisplay();
        }

        function calculateResult(shouldPlaySound = true) {
            let prev, current;
            let opToUse;

            if (operator !== null) {
                prev = parseFloat(previousInput.split(' ')[0].replace(/\./g, '').replace(',', '.'));
                current = parseFloat(currentInput);
                opToUse = operator;
                lastOperand = current;
                lastOperator = operator;
            } 
            else if (lastOperator !== null) {
                prev = parseFloat(currentInput);
                current = lastOperand;
                opToUse = lastOperator;
            } 
            else {
                return;
            }

            if (shouldPlaySound) playCoinSound();

            let result;
            if (isNaN(prev) || isNaN(current)) return;

            switch (opToUse) {
                case '+': result = prev + current; break;
                case '-': result = prev - current; break;
                case '*': result = prev * current; break;
                case '/': 
                    if (current === 0) {
                        result = "Div by 0";
                    } else {
                        result = prev / current;
                    }
                    break;
                default: return;
            }

            if (operator === null) {
                previousInput = formatDisplay(prev) + ' ' + opToUse + ' ' + formatDisplay(current);
            } else {
                previousInput = '';
            }

            currentInput = result.toString();
            operator = null;
            shouldResetScreen = true;
            updateDisplay();
        }

        window.addEventListener('keydown', (e) => {
            if (e.key >= 0 && e.key <= 9) appendNumber(e.key);
            if (e.key === '.' || e.key === ',') appendNumber(',');
            if (e.key === '=' || e.key === 'Enter') calculateResult();
            if (e.key === 'Backspace') deleteLast();
            if (e.key === 'Escape') clearDisplay();
            if (['+', '-', '*', '/'].includes(e.key)) appendOperator(e.key);
        });
    </script>
</body>
</html>
