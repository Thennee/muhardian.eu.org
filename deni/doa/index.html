<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doa Pilihan - Muhardian Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        :root {
            --primary-bg: #0f0f0f;
            --accent: #6366f1;
            --book-width: 450px;
            --book-height: 70vh;
            --transition-speed: 0.8s;
        }

        body {
            background-color: var(--primary-bg);
            color: #e5e7eb;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            font-family: 'Inter', sans-serif;
            touch-action: none; /* Mencegah pull-to-refresh dan scroll default browser */
        }

        #main-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            position: relative;
        }

        .book-label {
            width: 85%;
            max-width: var(--book-width);
            background: rgba(30, 30, 30, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 0;
            text-align: center;
            z-index: 110;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        #page-header {
            border-bottom: none;
            border-radius: 12px 12px 0 0;
        }

        #page-footer {
            border-top: none;
            border-radius: 0 0 12px 12px;
            font-size: 10px;
            color: #666;
            letter-spacing: 0.5px;
        }

        #pageInfo {
            font-size: 0.85rem;
            color: #a5b4fc;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #book-container {
            position: relative;
            width: 85%;
            max-width: var(--book-width);
            height: var(--book-height);
            perspective: 3000px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .sheet {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            transition: transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: left center;
            z-index: 10;
            pointer-events: none;
        }

        .page-front, .page-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: #2d2d2d;
            border-radius: 0 12px 12px 0;
            box-shadow: inset 5px 0 15px rgba(0,0,0,0.5), 5px 5px 25px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .page-back {
            transform: rotateY(180deg);
            background: #252525;
            border-radius: 12px 0 0 12px;
        }

        .sheet::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.4), transparent);
            z-index: 5;
            pointer-events: none;
        }

        .sheet.flipped {
            transform: rotateY(-180deg);
        }

        .book-base {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #1a1a1a;
            border-radius: 0 12px 12px 0;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
            z-index: 1;
            transform: translateZ(-20px);
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-overlay {
            position: absolute;
            top: 0;
            height: 100%;
            width: 40%;
            z-index: 200;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.03);
            font-size: 3rem;
            transition: all 0.3s;
            user-select: none;
        }
        
        .nav-overlay:hover {
            color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.01);
        }

        #prevArea { left: -10%; } 
        #nextArea { right: -10%; }

        #loader {
            position: fixed;
            inset: 0;
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--accent);
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .copyright-link { color: #888; text-decoration: none; transition: color 0.2s; }
        .copyright-link:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p class="text-xs uppercase tracking-widest text-gray-500">Membuka Lembaran Doa...</p>
    </div>

    <div id="main-wrapper">
        <div id="page-header" class="book-label">
            <div id="pageInfo">Memuat Halaman...</div>
        </div>

        <div id="book-container">
            <div id="prevArea" class="nav-overlay">❮</div>
            <div id="nextArea" class="nav-overlay">❯</div>
            <div class="book-base"></div>
        </div>

        <div id="page-footer" class="book-label">
            Deploy Code by <a href="https://muhardian.eu.org" target="_blank" class="copyright-link">Muhardian @ 2026</a>
        </div>
    </div>

    <script>
        const CONFIG = {
            pdfUrl: 'https://muhardian.eu.org/deni/doa/doa.pdf',
            flipSoundUrl: 'https://muhardian.eu.org/deni/doa/kertas.mp3',
            renderScale: 2,
            swipeThreshold: 50 // Jarak minimal usapan (pixel) untuk memicu pindah halaman
        };

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let state = {
            pdfDoc: null,
            currentSheetIndex: 0,
            totalPages: 0,
            isMoving: false,
            sheets: [],
            touchStartX: 0,
            touchStartY: 0
        };

        const container = document.getElementById('book-container');
        const sound = new Audio(CONFIG.flipSoundUrl);

        async function init() {
            try {
                const loadingTask = pdfjsLib.getDocument(CONFIG.pdfUrl);
                state.pdfDoc = await loadingTask.promise;
                state.totalPages = state.pdfDoc.numPages;

                for (let i = 1; i <= state.totalPages; i += 2) {
                    const sheet = await createSheet(i);
                    container.appendChild(sheet);
                    state.sheets.push(sheet);
                }

                updateBook();
                setupTouchEvents();
                document.getElementById('loader').style.display = 'none';
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = "Gagal memuat dokumen.";
            }
        }

        async function renderPage(pageNum) {
            if (pageNum > state.totalPages) return null;
            const page = await state.pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: CONFIG.renderScale });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: ctx, viewport }).promise;
            return canvas;
        }

        async function createSheet(pageNum) {
            const sheet = document.createElement('div');
            sheet.className = 'sheet';
            sheet.dataset.index = Math.floor((pageNum - 1) / 2);

            const front = document.createElement('div');
            front.className = 'page-front';
            const canvasFront = await renderPage(pageNum);
            if (canvasFront) front.appendChild(canvasFront);

            const back = document.createElement('div');
            back.className = 'page-back';
            const canvasBack = await renderPage(pageNum + 1);
            if (canvasBack) back.appendChild(canvasBack);

            sheet.appendChild(front);
            sheet.appendChild(back);
            
            return sheet;
        }

        function updateBook() {
            state.sheets.forEach((sheet, index) => {
                if (index < state.currentSheetIndex) {
                    sheet.classList.add('flipped');
                    sheet.style.zIndex = 10 + index;
                } else {
                    sheet.classList.remove('flipped');
                    sheet.style.zIndex = 100 - index;
                }
            });

            const displayPage = (state.currentSheetIndex * 2) + 1;
            const secondPage = Math.min(displayPage + 1, state.totalPages);
            
            const infoText = (displayPage === secondPage) ? 
                `Halaman ${displayPage}` : 
                `Halaman ${displayPage} - ${secondPage}`;
                
            document.getElementById('pageInfo').innerText = infoText;
        }

        function flip(direction) {
            if (state.isMoving) return;

            if (direction === 'next' && state.currentSheetIndex < state.sheets.length) {
                state.isMoving = true;
                playSound();
                state.currentSheetIndex++;
                updateBook();
                setTimeout(() => state.isMoving = false, 850);
            } else if (direction === 'prev' && state.currentSheetIndex > 0) {
                state.isMoving = true;
                playSound();
                state.currentSheetIndex--;
                updateBook();
                setTimeout(() => state.isMoving = false, 850);
            }
        }

        function playSound() {
            sound.currentTime = 0;
            sound.play().catch(() => {});
        }

        // Logic Swipe / Sapu Layar
        function setupTouchEvents() {
            window.addEventListener('touchstart', (e) => {
                state.touchStartX = e.changedTouches[0].screenX;
                state.touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            window.addEventListener('touchend', (e) => {
                const touchEndX = e.changedTouches[0].screenX;
                const touchEndY = e.changedTouches[0].screenY;
                handleGesture(state.touchStartX, touchEndX, state.touchStartY, touchEndY);
            }, { passive: true });
        }

        function handleGesture(startX, endX, startY, endY) {
            const diffX = endX - startX;
            const diffY = endY - startY;

            // Pastikan gerakan lebih dominan horizontal daripada vertikal
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (Math.abs(diffX) > CONFIG.swipeThreshold) {
                    if (diffX < 0) {
                        // Sapu ke kiri -> Halaman Berikutnya
                        flip('next');
                    } else {
                        // Sapu ke kanan -> Halaman Sebelumnya
                        flip('prev');
                    }
                }
            }
        }

        document.getElementById('nextArea').onclick = (e) => {
            e.stopPropagation();
            flip('next');
        };
        
        document.getElementById('prevArea').onclick = (e) => {
            e.stopPropagation();
            flip('prev');
        };

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight' || e.key === ' ') flip('next');
            if (e.key === 'ArrowLeft') flip('prev');
        });

        window.onload = init;
    </script>
</body>
</html>
