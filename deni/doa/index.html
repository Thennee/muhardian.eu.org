<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doa Pilihan - Muhardian Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        body {
            background-color: #1a1a1a;
            color: #e5e7eb;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            font-family: sans-serif;
        }

        /* Header Area untuk Halaman */
        #top-info {
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 60;
            background: #1a1a1a;
        }

        #viewer-container {
            flex-grow: 1;
            position: relative;
            perspective: 1500px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #121212;
        }

        .calendar-page {
            position: absolute;
            width: 90%;
            height: 82%; /* Menyesuaikan agar ada ruang untuk footer di bawahnya */
            background: #2d2d2d;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            border-radius: 8px;
            transform-origin: top center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backface-visibility: hidden;
            top: 15px; /* Jarak dari atas */
        }

        .calendar-page.active, 
        .calendar-page.flipped, 
        .calendar-page.next {
            display: flex;
        }

        .calendar-page.flipped {
            transform: rotateX(-120deg);
            opacity: 0;
            pointer-events: none;
            z-index: 5;
        }

        .calendar-page.active {
            z-index: 20;
            transform: rotateX(0deg);
            opacity: 1;
        }

        .calendar-page.next {
            z-index: 10;
            transform: scale(0.95);
            opacity: 0.5;
            top: 25px;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #6366f1;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .nav-overlay {
            position: absolute;
            top: 0;
            height: 100%;
            width: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0);
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 2rem;
            z-index: 100;
            transition: background 0.3s, color 0.3s;
            cursor: pointer;
            outline: none;
        }

        .nav-overlay:hover:not(:disabled) {
            background: rgba(0, 0, 0, 0.1);
            color: rgba(255, 255, 255, 0.8);
        }

        #prevBtn { left: 0; }
        #nextBtn { right: 0; }

        .page-counter-pill {
            background: rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            color: #a5b4fc;
            font-weight: 600;
        }

        /* Footer Melayang dinaikkan posisinya */
        .copyright-footer {
            position: absolute;
            bottom: 45px; /* Menaikkan posisi footer */
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            color: #d1d5db;
            font-size: 10px;
            padding: 5px 14px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 70;
            pointer-events: auto;
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .copyright-footer a {
            color: #818cf8;
            font-weight: bold;
            margin-left: 4px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p class="text-xs text-gray-400">Memuat Kalender Doa...</p>
    </div>

    <!-- Header info di atas -->
    <div id="top-info">
        <div id="pageInfo" class="page-counter-pill">Halaman -- / --</div>
    </div>

    <div id="viewer-container">
        <button id="prevBtn" class="nav-overlay" disabled>&#10094;</button>
        <button id="nextBtn" class="nav-overlay">&#10095;</button>
        
        <!-- Halaman dimasukkan di sini oleh JS -->

        <!-- Footer melayang dinaikkan lokasinya -->
        <div class="copyright-footer">
            Deploy Code by <a href="https://muhardian.eu.org/deni" target="_blank">Muhardian@2026</a>
        </div>
    </div>

    <script>
        const pdfUrl = 'https://muhardian.eu.org/deni/doa/doa.pdf';
        const flipSoundUrl = 'https://muhardian.eu.org/deni/doa/kertas.mp3';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        const viewer = document.getElementById('viewer-container');
        const flipSound = new Audio(flipSoundUrl);

        function playFeedback() {
            flipSound.currentTime = 0;
            flipSound.play().catch(() => {});
            if (navigator.vibrate) navigator.vibrate(50);
        }

        async function renderPageToCanvas(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 2 });
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: context, viewport: viewport }).promise;
            return canvas;
        }

        async function createPageElement(pageNum) {
            const div = document.createElement('div');
            div.className = 'calendar-page';
            div.id = `page-${pageNum}`;
            const canvas = await renderPageToCanvas(pageNum);
            div.appendChild(canvas);
            return div;
        }

        async function init() {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;

                const el1 = await createPageElement(1);
                viewer.appendChild(el1);
                
                updateUI();
                document.getElementById('loader').style.display = 'none';

                loadRemaining();

            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = "Gagal memuat PDF.";
            }
        }

        async function loadRemaining() {
            for (let i = 2; i <= totalPages; i++) {
                const el = await createPageElement(i);
                viewer.appendChild(el);
                if (i === currentPage + 1) updateUI();
            }
        }

        function updateUI() {
            const pages = document.querySelectorAll('.calendar-page');
            pages.forEach((page, index) => {
                const pNum = index + 1;
                page.classList.remove('active', 'flipped', 'next');

                if (pNum < currentPage) {
                    page.classList.add('flipped');
                } else if (pNum === currentPage) {
                    page.classList.add('active');
                } else if (pNum === currentPage + 1) {
                    page.classList.add('next');
                }
            });

            document.getElementById('pageInfo').innerText = `Halaman ${currentPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        document.getElementById('nextBtn').onclick = (e) => {
            e.stopPropagation();
            if (currentPage < totalPages) {
                currentPage++;
                playFeedback();
                updateUI();
            }
        };

        document.getElementById('prevBtn').onclick = (e) => {
            e.stopPropagation();
            if (currentPage > 1) {
                currentPage--;
                playFeedback();
                updateUI();
            }
        };

        viewer.onclick = (e) => {
            if (e.target.closest('.nav-overlay') || e.target.closest('.copyright-footer')) return;
            const clickX = e.clientX;
            const screenWidth = window.innerWidth;
            if (clickX < screenWidth / 2) {
                document.getElementById('prevBtn').click();
            } else {
                document.getElementById('nextBtn').click();
            }
        };

        let touchStartY = 0;
        viewer.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY);
        viewer.addEventListener('touchend', e => {
            const touchEndY = e.changedTouches[0].clientY;
            if (touchStartY - touchEndY > 50) document.getElementById('nextBtn').click();
            if (touchEndY - touchStartY > 50) document.getElementById('prevBtn').click();
        });

        window.onload = init;
    </script>
</body>
</html>
