<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doa Pilihan - Muhardian Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        :root {
            --primary-bg: #121212;
            --accent: #6366f1;
            --book-width: 450px;
            --book-height: 70vh;
            --transition-speed: 1.8s;
        }

        body {
            background-color: var(--primary-bg);
            color: #e5e7eb;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            font-family: 'Inter', sans-serif;
        }

        #top-info {
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            background: rgba(18, 18, 18, 0.9);
            backdrop-filter: blur(10px);
        }

        #book-container {
            flex-grow: 1;
            position: relative;
            perspective: 4000px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #252525 0%, #0a0a0a 100%);
        }

        /* Struktur Lembaran Buku */
        .sheet {
            position: absolute;
            width: 85%;
            max-width: var(--book-width);
            height: var(--book-height);
            transform-style: preserve-3d;
            transition: transform var(--transition-speed) cubic-bezier(0.645, 0.045, 0.355, 1);
            transform-origin: left center;
            z-index: 10;
        }

        /* Bagian depan dan belakang lembaran */
        .page-front, .page-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: #2d2d2d;
            border-radius: 4px 12px 12px 4px;
            box-shadow: inset 5px 0 15px rgba(0,0,0,0.5), 5px 5px 25px rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Halaman belakang diputar 180 derajat */
        .page-back {
            transform: rotateY(180deg);
            background: #252525;
            border-radius: 12px 4px 4px 12px;
        }

        /* Efek lengkungan jilidan di tengah */
        .sheet::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 5px;
            height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.5), transparent);
            z-index: 5;
            pointer-events: none;
        }

        /* State Halaman */
        .sheet.flipped {
            transform: rotateY(-180deg);
        }

        /* Tumpukan Statis di Bawah */
        .book-base {
            position: absolute;
            width: 85%;
            max-width: var(--book-width);
            height: var(--book-height);
            background: #1a1a1a;
            border-radius: 4px 12px 12px 4px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            z-index: 1;
            transform: translateZ(-20px);
        }

        canvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .nav-overlay {
            position: absolute;
            top: 0;
            height: 100%;
            width: 15%;
            z-index: 200;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255,255,255,0.1);
            font-size: 2rem;
            transition: color 0.3s;
        }
        .nav-overlay:hover { color: white; }
        #prevArea { left: 0; }
        #nextArea { right: 0; }

        .page-counter-pill {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.3);
            padding: 8px 24px;
            border-radius: 99px;
            color: #a5b4fc;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        #loader {
            position: fixed;
            inset: 0;
            background: #121212;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: var(--accent);
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .copyright-footer {
            position: absolute;
            bottom: 20px;
            background: rgba(0,0,0,0.6);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 10px;
            color: #666;
            z-index: 300;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p class="text-xs uppercase tracking-widest text-gray-500">Membuka Lembaran Doa...</p>
    </div>

    <div id="top-info">
        <div id="pageInfo" class="page-counter-pill">Halaman 1</div>
    </div>

    <div id="book-container">
        <div id="prevArea" class="nav-overlay">❮</div>
        <div id="nextArea" class="nav-overlay">❯</div>
        
        <div class="book-base"></div>
        <!-- Lembaran (Sheets) akan dimasukkan di sini oleh JS -->

        <div class="copyright-footer">
            Deploy Code by <a href="https://muhardian.eu.org/deni" class="text-indigo-400">Muhardian @ 2026</a>
        </div>
    </div>

    <script>
        const CONFIG = {
            pdfUrl: 'https://muhardian.eu.org/deni/doa/doa.pdf',
            flipSoundUrl: 'https://muhardian.eu.org/deni/doa/kertas.mp3',
            renderScale: 2
        };

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let state = {
            pdfDoc: null,
            currentPage: 1, // Halaman fisik saat ini
            totalPages: 0,
            isMoving: false,
            sheets: [] // Array elemen sheet
        };

        const container = document.getElementById('book-container');
        const sound = new Audio(CONFIG.flipSoundUrl);

        async function init() {
            try {
                const loadingTask = pdfjsLib.getDocument(CONFIG.pdfUrl);
                state.pdfDoc = await loadingTask.promise;
                state.totalPages = state.pdfDoc.numPages;

                // Buat lembaran (1 sheet = 2 halaman PDF)
                // Lembaran 1: Depan (Hal 1), Belakang (Hal 2)
                for (let i = 1; i <= state.totalPages; i += 2) {
                    const sheet = await createSheet(i);
                    container.appendChild(sheet);
                    state.sheets.push(sheet);
                }

                updateBook();
                
                document.getElementById('loader').style.display = 'none';
            } catch (err) {
                console.error(err);
                document.getElementById('loader').innerHTML = "Gagal memuat dokumen.";
            }
        }

        async function renderPage(pageNum) {
            if (pageNum > state.totalPages) return null;
            const page = await state.pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: CONFIG.renderScale });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: ctx, viewport }).promise;
            return canvas;
        }

        async function createSheet(pageNum) {
            const sheet = document.createElement('div');
            sheet.className = 'sheet';
            sheet.dataset.index = Math.floor((pageNum - 1) / 2);

            const front = document.createElement('div');
            front.className = 'page-front';
            const canvasFront = await renderPage(pageNum);
            if (canvasFront) front.appendChild(canvasFront);

            const back = document.createElement('div');
            back.className = 'page-back';
            const canvasBack = await renderPage(pageNum + 1);
            if (canvasBack) back.appendChild(canvasBack);

            sheet.appendChild(front);
            sheet.appendChild(back);
            
            // Atur z-index awal agar tumpukan benar (halaman awal paling atas)
            sheet.style.zIndex = 100 - sheet.dataset.index;
            
            return sheet;
        }

        function updateBook() {
            state.sheets.forEach((sheet, index) => {
                if (index < state.currentSheetIndex) {
                    sheet.classList.add('flipped');
                    sheet.style.zIndex = 10 + index; // Halaman lama di bawah kiri
                } else {
                    sheet.classList.remove('flipped');
                    sheet.style.zIndex = 100 - index; // Halaman baru di atas kanan
                }
            });

            const displayPage = (state.currentSheetIndex * 2) + 1;
            document.getElementById('pageInfo').innerText = `Halaman ${displayPage} - ${Math.min(displayPage + 1, state.totalPages)}`;
        }

        state.currentSheetIndex = 0;

        function flip(direction) {
            if (state.isMoving) return;

            if (direction === 'next' && state.currentSheetIndex < state.sheets.length) {
                state.isMoving = true;
                sound.currentTime = 0;
                sound.play().catch(() => {});
                state.currentSheetIndex++;
                updateBook();
                setTimeout(() => state.isMoving = false, 1800);
            } else if (direction === 'prev' && state.currentSheetIndex > 0) {
                state.isMoving = true;
                sound.currentTime = 0;
                sound.play().catch(() => {});
                state.currentSheetIndex--;
                updateBook();
                setTimeout(() => state.isMoving = false, 1800);
            }
        }

        document.getElementById('nextArea').onclick = () => flip('next');
        document.getElementById('prevArea').onclick = () => flip('prev');

        // Swipe & Keys
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowRight') flip('next');
            if (e.key === 'ArrowLeft') flip('prev');
        });

        window.onload = init;
    </script>
</body>
</html>
