<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doa Pilihan - Muhardian Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    
    <style>
        body {
            background-color: #1a1a1a;
            color: #e5e7eb;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            font-family: sans-serif;
        }

        #viewer-container {
            flex-grow: 1;
            position: relative;
            perspective: 1500px; /* Memberikan efek 3D */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #121212;
        }

        .calendar-page {
            position: absolute;
            width: 90%;
            height: 85%;
            background: #2d2d2d;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5);
            border-radius: 8px;
            transform-origin: top center;
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.8s;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            backface-visibility: hidden;
        }

        /* Animasi Flip ke Atas (Kalender) */
        .calendar-page.flipped {
            transform: rotateX(-120deg);
            opacity: 0;
            pointer-events: none;
        }

        /* Halaman yang sedang aktif */
        .calendar-page.active {
            z-index: 20;
            transform: rotateX(0deg);
            opacity: 1;
        }

        /* Halaman berikutnya (di bawah) */
        .calendar-page.next {
            z-index: 10;
            transform: scale(0.95);
            opacity: 0.5;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 4px;
        }

        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #6366f1;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .controls {
            background: #262626;
            height: 70px;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #404040;
            z-index: 60;
        }

        .btn-nav {
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            background: #4f46e5;
            color: white;
            transition: 0.2s;
        }

        .btn-nav:disabled {
            background: #4b5563;
            opacity: 0.5;
        }

        .copyright-footer {
            background: #f9fafb;
            color: #4b5563;
            font-size: 10px;
            text-align: center;
            height: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 60;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p class="text-xs text-gray-400">Memuat Kalender Doa...</p>
    </div>

    <div id="viewer-container">
        <!-- Pages injected here -->
    </div>

    <div class="controls">
        <button id="prevBtn" class="btn-nav" disabled>Sebelumnya</button>
        <span id="pageInfo" class="text-xs font-mono text-gray-400">Halaman -- / --</span>
        <button id="nextBtn" class="btn-nav">Berikutnya</button>
    </div>

    <div class="copyright-footer">
        Deploy Code by <a href="https://muhardian.eu.org/deni" target="_blank" class="ml-1 font-bold text-indigo-600">Muhardian@2026</a>
    </div>

    <script>
        const pdfUrl = 'https://muhardian.eu.org/deni/doa/doa.pdf';
        const flipSoundUrl = 'https://muhardian.eu.org/deni/doa/kertas.mp3';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pdfDoc = null;
        let currentPage = 1;
        let totalPages = 0;
        const viewer = document.getElementById('viewer-container');
        const flipSound = new Audio(flipSoundUrl);

        function playFeedback() {
            flipSound.currentTime = 0;
            flipSound.play().catch(() => {});
            if (navigator.vibrate) navigator.vibrate(50);
        }

        async function renderPageToCanvas(pageNum) {
            const page = await pdfDoc.getPage(pageNum);
            const viewport = page.getViewport({ scale: 2 });
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;
            await page.render({ canvasContext: context, viewport: viewport }).promise;
            return canvas;
        }

        async function createPageElement(pageNum) {
            const div = document.createElement('div');
            div.className = 'calendar-page';
            div.id = `page-${pageNum}`;
            const canvas = await renderPageToCanvas(pageNum);
            div.appendChild(canvas);
            return div;
        }

        async function init() {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                pdfDoc = await loadingTask.promise;
                totalPages = pdfDoc.numPages;

                // Load 3 halaman pertama untuk awal yang cepat
                for (let i = 1; i <= Math.min(totalPages, 3); i++) {
                    const el = await createPageElement(i);
                    viewer.appendChild(el);
                }

                updateUI();
                document.getElementById('loader').style.display = 'none';

                // Load sisanya di background
                loadRemaining();

            } catch (e) {
                console.error(e);
                document.getElementById('loader').innerHTML = "Gagal memuat PDF.";
            }
        }

        async function loadRemaining() {
            for (let i = 4; i <= totalPages; i++) {
                const el = await createPageElement(i);
                viewer.appendChild(el);
            }
        }

        function updateUI() {
            const pages = document.querySelectorAll('.calendar-page');
            pages.forEach((page, index) => {
                const pNum = index + 1;
                page.classList.remove('active', 'flipped', 'next');

                if (pNum < currentPage) {
                    page.classList.add('flipped');
                } else if (pNum === currentPage) {
                    page.classList.add('active');
                } else if (pNum === currentPage + 1) {
                    page.classList.add('next');
                }
            });

            document.getElementById('pageInfo').innerText = `Halaman ${currentPage} / ${totalPages}`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage === totalPages;
        }

        document.getElementById('nextBtn').onclick = () => {
            if (currentPage < totalPages) {
                currentPage++;
                playFeedback();
                updateUI();
            }
        };

        document.getElementById('prevBtn').onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                playFeedback();
                updateUI();
            }
        };

        // Swipe support sederhana
        let touchStartY = 0;
        viewer.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY);
        viewer.addEventListener('touchend', e => {
            const touchEndY = e.changedTouches[0].clientY;
            if (touchStartY - touchEndY > 50) document.getElementById('nextBtn').click();
            if (touchEndY - touchStartY > 50) document.getElementById('prevBtn').click();
        });

        window.onload = init;
    </script>
</body>
</html>
