<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Doa Doa Pilihan - Muhardian Project</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PDF.js for rendering PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- PageFlip library for book effect -->
    <script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.min.js"></script>
    
    <style>
        body {
            background-color: #1a1a1a;
            color: #e5e7eb;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            font-family: sans-serif;
        }

        #canvas-container {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #121212;
        }

        #book-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .flip-book {
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            background: #1a1a1a;
            visibility: hidden; /* Sembunyikan sampai halaman 1 siap */
        }

        .page {
            background-color: #2d2d2d;
            overflow: hidden;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain;
        }

        /* Loading Spinner */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border-left-color: #6366f1;
            animation: spin 1s linear infinite;
            margin-bottom: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .controls {
            background: #262626;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #404040;
            z-index: 60;
        }

        .copyright-footer {
            background: #f9fafb;
            color: #4b5563;
            font-size: 10px;
            text-align: center;
            padding: 6px 0;
            border-top: 1px solid #e5e7eb;
            z-index: 60;
        }

        .copyright-footer a {
            color: #4f46e5;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-nav {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
    </style>
</head>
<body>

    <!-- Loading State -->
    <div id="loader">
        <div class="spinner"></div>
        <p id="loader-text" class="text-xs text-gray-400">Menyiapkan Halaman 1...</p>
    </div>

    <!-- Main Viewer Area -->
    <div id="canvas-container">
        <div id="book-container">
            <div id="flipbook" class="flip-book">
                <!-- Pages will be injected dynamically -->
            </div>
        </div>
    </div>

    <!-- Navigasi -->
    <div class="controls">
        <button id="prevBtn" class="btn-nav bg-gray-700 hover:bg-gray-600 text-white">
            Kembali
        </button>
        <span id="pageInfo" class="text-xs font-mono text-gray-400">Halaman -- / --</span>
        <button id="nextBtn" class="btn-nav bg-indigo-600 hover:bg-indigo-500 text-white">
            Lanjut
        </button>
    </div>

    <!-- Footer Copyright -->
    <div class="copyright-footer">
        Deploy Code by <a href="https://muhardian.eu.org/deni" target="_blank">Muhardian@2026</a>
    </div>

    <script>
        const pdfUrl = 'https://muhardian.eu.org/deni/doa/doa.pdf';
        const flipSoundUrl = 'https://muhardian.eu.org/deni/doa/kertas.mp3';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        let pageFlip = null;
        const flipbookEl = document.getElementById('flipbook');
        const loader = document.getElementById('loader');
        const loaderText = document.getElementById('loader-text');
        const pageInfo = document.getElementById('pageInfo');
        const flipSound = new Audio(flipSoundUrl);

        function playFeedback() {
            flipSound.currentTime = 0;
            flipSound.play().catch(() => {});
            if (navigator.vibrate) navigator.vibrate(50);
        }

        async function renderPage(pdf, pageNum, vw) {
            const page = await pdf.getPage(pageNum);
            const unscaledViewport = page.getViewport({ scale: 1 });
            // Gunakan vw dengan fallback jika window.innerWidth bermasalah
            const currentVW = vw || window.innerWidth || 300;
            const scale = (currentVW / unscaledViewport.width) * 2; 
            const viewport = page.getViewport({ scale: scale });
            
            const pageWrapper = document.createElement('div');
            pageWrapper.className = 'page';
            
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: context, viewport: viewport }).promise;
            pageWrapper.appendChild(canvas);
            return pageWrapper;
        }

        async function initFlipBook() {
            try {
                const loadingTask = pdfjsLib.getDocument(pdfUrl);
                const pdf = await loadingTask.promise;
                const totalPages = pdf.numPages;

                // Memastikan nilai dimensi valid dan tidak nol
                const vw = Math.max(window.innerWidth, 200);
                const vh = Math.max(window.innerHeight - (48 + 57 + 23), 300); 

                // 1. Render hanya halaman pertama dahulu
                const firstPage = await renderPage(pdf, 1, vw);
                flipbookEl.appendChild(firstPage);

                // 2. Inisialisasi PageFlip
                // Menambahkan pengecekan dimensi sebelum inisialisasi
                if (vw <= 0 || vh <= 0) {
                    throw new Error("Invalid viewport dimensions detected.");
                }

                pageFlip = new St.PageFlip(flipbookEl, {
                    width: vw,
                    height: vh,
                    size: "stretch",
                    minWidth: 100,
                    maxWidth: 3000,
                    minHeight: 100,
                    maxHeight: 3000,
                    drawShadow: true,
                    flippingTime: 800,
                    usePortrait: true,
                    startPage: 0,
                    showCover: false,
                    mobileScrollSupport: false,
                    clickEventForward: false,
                    useMouseEvents: true,
                    showPageCorners: true
                });

                pageFlip.loadFromHTML(document.querySelectorAll('.page'));
                
                // Tampilkan buku dan sembunyikan loader setelah halaman 1 siap
                flipbookEl.style.visibility = 'visible';
                loader.style.display = 'none';
                updatePageCounter(1, totalPages);

                // 3. Render sisa halaman di latar belakang
                renderRemainingPages(pdf, totalPages, vw);

                pageFlip.on('flip', (e) => {
                    updatePageCounter(e.data + 1, totalPages);
                    playFeedback();
                });

                document.getElementById('prevBtn').onclick = () => pageFlip.flipPrev();
                document.getElementById('nextBtn').onclick = () => pageFlip.flipNext();

            } catch (error) {
                console.error('PDF/FlipBook Error:', error);
                loader.innerHTML = `<p class="text-red-500 p-4">Terjadi kesalahan: ${error.message || 'Gagal memuat PDF'}</p>`;
            }
        }

        async function renderRemainingPages(pdf, totalPages, vw) {
            for (let i = 2; i <= totalPages; i++) {
                try {
                    const nextPage = await renderPage(pdf, i, vw);
                    flipbookEl.appendChild(nextPage);
                } catch (e) {
                    console.warn(`Gagal merender halaman ${i}`, e);
                }
            }
            // Update data PageFlip setelah semua halaman masuk ke DOM
            if (pageFlip) {
                pageFlip.updateFromHtml(document.querySelectorAll('.page'));
            }
        }

        function updatePageCounter(current, total) {
            if (pageInfo) {
                pageInfo.innerText = `Halaman ${current} / ${total}`;
            }
        }

        window.onload = initFlipBook;

        let timer;
        window.onresize = () => {
            clearTimeout(timer);
            timer = setTimeout(() => {
                // Hanya reload jika ukuran berubah signifikan untuk menghindari error loop
                location.reload(); 
            }, 500);
        };
    </script>
</body>
</html>
