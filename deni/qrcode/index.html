<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhardian Scanner & Generator</title>
    <!-- External Libraries -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.jsdelivr.net/npm/bwip-js@3.0.4/dist/bwip-js-min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-red: #ff003c;
            --dark-bg: #0a0002;
            --card-bg: #1a0205;
        }

        body {
            background-color: var(--dark-bg);
            color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .neon-border {
            border: 2px solid var(--neon-red);
            box-shadow: 0 0 10px var(--neon-red), inset 0 0 5px var(--neon-red);
        }

        .neon-text {
            text-shadow: 0 0 5px var(--neon-red), 0 0 10px var(--neon-red);
        }

        .neon-button {
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            cursor: pointer;
        }

        .neon-button:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 20px var(--neon-red);
        }

        .glass-card {
            background: var(--card-bg);
            border-radius: 15px;
            border: 1px solid rgba(255, 0, 60, 0.2);
        }

        /* Container Bingkai Putih Adaptif */
        .pro-export-card {
            background: white;
            display: inline-block;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(255, 0, 60, 0.4);
            margin: 0 auto;
            max-width: 95%;
            transition: all 0.3s ease;
        }

        #gen-canvas {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto !important;
        }

        #reader {
            width: 100% !important;
            border: none !important;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }

        #reader video {
            border-radius: 12px;
            object-fit: cover;
        }

        /* Footer Samar dengan Efek Merah */
        .minimal-footer {
            padding: 2rem 0;
            margin-top: auto;
            text-align: center;
        }

        .samar-text {
            color: rgba(255, 255, 255, 0.2); /* Sangat samar */
            font-size: 0.8rem;
            letter-spacing: 2px;
            transition: color 0.3s ease;
            text-shadow: 0 0 2px rgba(255, 0, 61, 0.1);
        }

        .samar-text:hover {
            color: rgba(255, 0, 61, 0.5); /* Agak menyala saat dihover */
        }

        .animate-fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="min-h-screen">

    <div class="flex-grow p-4 md:p-8">
        <div class="max-w-2xl mx-auto space-y-8">
            <!-- Header -->
            <header class="text-center">
                <h1 class="text-4xl font-black neon-text italic uppercase">Muhardian Scan</h1>
                <p class="text-gray-400 mt-2 italic">Professional Generating Engine</p>
            </header>

            <!-- Navigasi -->
            <div class="flex gap-2 justify-center">
                <button id="btn-tab-scan" onclick="switchTab('scan')" class="neon-button px-6 py-2 rounded-full flex-1">Scanner</button>
                <button id="btn-tab-gen" onclick="switchTab('gen')" class="neon-button px-6 py-2 rounded-full flex-1 opacity-50">Generator</button>
            </div>

            <!-- Bagian Scanner -->
            <section id="section-scan" class="space-y-4">
                <div class="glass-card p-4 neon-border">
                    <div id="reader"></div>
                    <p class="text-center text-xs text-gray-500 mt-4 italic">Arahkan kamera ke kode QR atau Barcode</p>
                </div>

                <div id="result-container" class="glass-card p-6 space-y-3 hidden animate-fade-in">
                    <h3 class="text-sm font-bold uppercase text-gray-500">Hasil Imbasan:</h3>
                    <div id="result-text" class="text-xl font-mono break-all text-white p-3 bg-black/50 rounded border border-gray-800">
                        -
                    </div>
                    <button onclick="copyResult()" class="w-full neon-button py-3 rounded-lg">Salin Teks</button>
                </div>
            </section>

            <!-- Bagian Generator -->
            <section id="section-gen" class="space-y-4 hidden text-center">
                <div class="glass-card p-6 space-y-6 text-left">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-400">Input Data</label>
                        <input type="text" id="gen-input" placeholder="Masukkan teks atau angka..." 
                            class="w-full bg-black/50 border border-red-900 p-3 rounded text-white focus:outline-none focus:border-red-500">
                    </div>

                    <div class="space-y-2">
                        <label class="text-sm font-bold text-gray-400">Jenis Format</label>
                        <select id="gen-type" class="w-full bg-black/50 border border-red-900 p-3 rounded text-white focus:outline-none">
                            <option value="qrcode">QR Code (Simetris)</option>
                            <option value="code128">Barcode 128 (Melebar)</option>
                            <option value="ean13">EAN-13 (Standard Retail)</option>
                        </select>
                    </div>

                    <button onclick="generateCode()" class="w-full neon-button py-3 rounded-lg">Generate Sekarang</button>

                    <div id="gen-error" class="p-3 bg-red-900/30 border border-red-600 text-red-400 text-sm rounded hidden text-center"></div>
                </div>

                <!-- Output Area -->
                <div id="gen-output-wrapper" class="flex flex-col items-center space-y-6 hidden animate-fade-in">
                    <div id="pro-card" class="pro-export-card">
                        <canvas id="gen-canvas"></canvas>
                    </div>
                    
                    <div class="flex gap-2 w-full max-w-sm">
                        <button onclick="downloadCode()" class="flex-1 neon-button py-3 rounded-full text-sm">Download PNG</button>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Footer Minimalist -->
    <footer class="minimal-footer">
        <p class="samar-text uppercase">Muhardian © 2026</p>
    </footer>

    <div id="toast" class="fixed bottom-12 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full bg-red-600 text-white font-bold opacity-0 transition-opacity pointer-events-none z-50 shadow-lg">
        Teks disalin!
    </div>

    <script>
        let html5QrCode;
        
        window.onload = () => {
            startScanner();
        };

        async function switchTab(tab) {
            const btnScan = document.getElementById('btn-tab-scan');
            const btnGen = document.getElementById('btn-tab-gen');
            const scanSection = document.getElementById('section-scan');
            const genSection = document.getElementById('section-gen');

            if (tab === 'scan') {
                scanSection.classList.remove('hidden');
                genSection.classList.add('hidden');
                btnScan.classList.remove('opacity-50');
                btnGen.classList.add('opacity-50');
                await startScanner();
            } else {
                scanSection.classList.add('hidden');
                genSection.classList.remove('hidden');
                btnScan.classList.add('opacity-50');
                btnGen.classList.remove('opacity-50');
                await stopScanner();
            }
        }

        async function startScanner() {
            if (html5QrCode && html5QrCode.isScanning) return;
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            try {
                const config = { fps: 15, qrbox: { width: 250, height: 250 } };
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
            } catch (err) {
                console.warn("Kamera tidak ditemukan:", err);
            }
        }

        async function stopScanner() {
            if (html5QrCode && html5QrCode.isScanning) {
                try { await html5QrCode.stop(); } catch (err) {}
            }
        }

        function onScanSuccess(decodedText) {
            const resultContainer = document.getElementById('result-container');
            const resultText = document.getElementById('result-text');
            resultContainer.classList.remove('hidden');
            resultText.innerText = decodedText;
            if (navigator.vibrate) navigator.vibrate(100);
        }

        function copyResult() {
            const text = document.getElementById('result-text').innerText;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showToast("Berhasil disalin!");
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.opacity = '1';
            setTimeout(() => toast.style.opacity = '0', 2000);
        }

        function generateCode() {
            const inputEl = document.getElementById('gen-input');
            let text = inputEl.value.trim();
            const type = document.getElementById('gen-type').value;
            const wrapper = document.getElementById('gen-output-wrapper');
            const errorDiv = document.getElementById('gen-error');
            const canvas = document.getElementById('gen-canvas');
            
            errorDiv.classList.add('hidden');
            
            if (!text) {
                errorDiv.innerText = "Sila isi input terlebih dahulu!";
                errorDiv.classList.remove('hidden');
                return;
            }

            try {
                const isQR = type === 'qrcode';
                
                const options = {
                    bcid: type,
                    text: text,
                    scale: 3,
                    includetext: !isQR,
                    textxalign: 'center',
                    backgroundcolor: 'ffffff',
                    paddingwidth: 10,
                    paddingheight: 10,
                };

                if (isQR) {
                    options.height = 60;
                    options.width = 60;
                } else {
                    options.height = 15;
                    options.width = 80;
                }

                bwipjs.toCanvas('gen-canvas', options);
                wrapper.classList.remove('hidden');
            } catch (e) {
                wrapper.classList.add('hidden');
                errorDiv.innerText = "Error: " + e.message;
                errorDiv.classList.remove('hidden');
            }
        }

        function downloadCode() {
            const canvas = document.getElementById('gen-canvas');
            if (!canvas) return;

            const margin = 60;
            const finalCanvas = document.createElement('canvas');
            finalCanvas.width = canvas.width + margin;
            finalCanvas.height = canvas.height + margin;
            
            const ctx = finalCanvas.getContext('2d');
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);
            ctx.drawImage(canvas, margin/2, margin/2);

            const link = document.createElement('a');
            link.download = `muhardian-${Date.now()}.png`;
            link.href = finalCanvas.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
