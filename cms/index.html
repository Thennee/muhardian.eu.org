<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhardian Pro | Content Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.0/ace.js"></script>
    <style>
        :root {
            --neon-red: #ff003c;
            --deep-black: #080808;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-black);
            color: #f5f5f5;
            overflow-x: hidden;
        }

        .font-heading { font-family: 'Space+Grotesk', sans-serif; }

        .bg-grid {
            background-image: linear-gradient(rgba(255, 0, 60, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 0, 60, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            position: fixed;
            inset: 0;
            z-index: -3;
        }

        #cursor-glow {
            position: fixed;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(255, 0, 60, 0.07) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -2;
            transition: width 0.3s ease;
        }

        .glass-nav {
            background: rgba(8, 8, 8, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neon-text {
            color: var(--neon-red);
            text-shadow: 0 0 15px rgba(255, 0, 60, 0.4);
        }

        .neon-border {
            border: 1px solid rgba(255, 0, 60, 0.15);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: rgba(12, 12, 12, 0.6);
        }

        .neon-border:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.1);
            transform: translateY(-4px);
        }

        .btn-primary {
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .btn-primary:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 40px rgba(255, 0, 60, 0.6);
        }

        #editor {
            height: 450px;
            width: 100%;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: var(--neon-red); }

        .tab-active {
            color: var(--neon-red);
            border-bottom: 2px solid var(--neon-red);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade { animation: fadeIn 0.5s ease forwards; }
    </style>
</head>
<body class="min-h-screen">

    <div class="bg-grid"></div>
    <div id="cursor-glow"></div>

    <nav class="glass-nav sticky top-0 z-[100] px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-red-600 rounded flex items-center justify-center font-black text-white italic">M</div>
                <h1 class="text-xl font-black tracking-tighter font-heading">MUHARDIAN<span class="neon-text">.CMS</span></h1>
            </div>
            <div id="navActions">
                <button onclick="showLogin()" class="btn-primary px-6 py-2 rounded-lg text-[10px]">Akses Admin</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        
        <!-- TAMPILAN PUBLIK -->
        <section id="publicView" class="py-20 text-center animate-fade">
            <span class="text-[10px] font-mono text-red-500 mb-4 block tracking-[0.5em] uppercase">Sistem Terenkripsi</span>
            <h2 class="text-5xl md:text-8xl font-black mb-6 italic tracking-tighter">MERAH <span class="neon-text">PUTIH</span></h2>
            <p class="text-gray-400 max-w-2xl mx-auto mb-12 text-lg">Manajemen aset digital dan basis data internal Muhardian Pro.</p>
            <button onclick="showLogin()" class="btn-primary px-12 py-4 rounded-full text-xs">Masuk ke Konsol</button>
        </section>

        <!-- DASHBOARD ADMIN -->
        <section id="adminView" class="hidden opacity-0 transition-opacity duration-500">
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end gap-6 mb-12 border-b border-white/10 pb-8">
                <div>
                    <h2 class="text-4xl font-black font-heading mb-2">Control Panel</h2>
                    <p class="text-[10px] font-mono text-gray-500 uppercase tracking-widest">Sesi Admin Aktif</p>
                </div>
                <div class="flex gap-3">
                    <button onclick="syncToCloud()" class="bg-red-600 hover:bg-red-700 text-white px-6 py-3 rounded-xl text-[10px] font-bold transition-all flex items-center gap-2">
                        SYNC KE CLOUD
                    </button>
                    <button onclick="logout()" class="px-6 py-3 border border-white/10 rounded-xl text-[10px] font-bold hover:bg-white/5 transition-all">LOGOUT</button>
                </div>
            </div>

            <!-- Tab Menu -->
            <div class="flex gap-10 mb-10 border-b border-white/5 overflow-x-auto whitespace-nowrap">
                <button onclick="setTab('compose')" id="tab-compose" class="tab-active pb-4 text-xs font-black uppercase tracking-widest">1. Tulis Baru</button>
                <button onclick="setTab('database')" id="tab-database" class="pb-4 text-xs font-black uppercase tracking-widest text-gray-500">2. Database</button>
                <button onclick="setTab('raw')" id="tab-raw" class="pb-4 text-xs font-black uppercase tracking-widest text-gray-500">3. Editor JSON</button>
            </div>

            <!-- Panel: Compose -->
            <div id="panel-compose" class="grid grid-cols-1 lg:grid-cols-12 gap-8 animate-fade">
                <div class="lg:col-span-5">
                    <div class="bg-[#0c0c0c] p-8 rounded-2xl neon-border">
                        <div class="flex justify-between items-center mb-6">
                            <h4 id="formTitle" class="text-xs font-black uppercase tracking-widest text-white">Buat Entri Baru</h4>
                            <button id="cancelEditBtn" onclick="cancelEdit()" class="hidden text-[9px] text-gray-500 hover:text-white uppercase font-bold underline">Batal Edit</button>
                        </div>
                        <div class="space-y-6">
                            <input type="hidden" id="editIndex" value="-1">
                            <div>
                                <label class="text-[10px] text-gray-500 font-bold block mb-2 uppercase">Judul Postingan</label>
                                <input id="titleInput" type="text" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm focus:border-red-600 outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] text-gray-500 font-bold block mb-2 uppercase">Konten / Isi</label>
                                <textarea id="bodyInput" rows="10" class="w-full bg-black border border-white/10 rounded-xl p-4 text-sm focus:border-red-600 outline-none"></textarea>
                            </div>
                            <button id="submitBtn" onclick="saveEntry()" class="w-full py-4 bg-white text-black font-black text-xs rounded-xl hover:bg-red-600 hover:text-white transition-all">SIMPAN KE ANTRIAN</button>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-7">
                    <div class="bg-[#0c0c0c]/50 p-8 rounded-2xl border border-white/5 h-full">
                        <h4 class="text-xs font-black mb-6 uppercase tracking-widest text-gray-500">Daftar Antrian Lokal</h4>
                        <div id="queueList" class="space-y-4 max-h-[600px] overflow-y-auto pr-4 custom-scrollbar">
                            <!-- Queue render -->
                        </div>
                    </div>
                </div>
            </div>

            <!-- Panel: Database -->
            <div id="panel-database" class="hidden animate-fade">
                <div id="dbGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                    <!-- Cards render -->
                </div>
            </div>

            <!-- Panel: Raw -->
            <div id="panel-raw" class="hidden animate-fade">
                <div class="rounded-2xl overflow-hidden border border-white/10">
                    <div class="bg-[#111] px-6 py-3 border-b border-white/5 flex justify-between items-center">
                        <span class="text-[10px] font-mono text-gray-500">RAW_DATA_STRUCTURE</span>
                        <button onclick="copyRaw()" class="text-[10px] text-red-500 font-bold uppercase">Salin JSON</button>
                    </div>
                    <div id="editor"></div>
                </div>
            </div>
        </section>

    </main>

    <footer class="mt-20 border-t border-white/5 py-12 text-center">
        <p class="text-[10px] text-gray-600 font-mono tracking-[0.5em] uppercase">Muhardian Pro Content Engine v2.0</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyCtaeg8_G-5H9lYHG9b91aHeQoJqwQfY3Z0spYUIGjSbPVYrZso1drJqvmtxEsbCc/exec";
        let localData = [];
        let currentPass = "";
        let aceEditor;

        // Init Editor Ace
        function initEditor() {
            aceEditor = ace.edit("editor");
            aceEditor.setTheme("ace/theme/tomorrow_night_eighties");
            aceEditor.session.setMode("ace/mode/json");
            aceEditor.setOptions({ fontSize: "14px", showPrintMargin: false, useWorker: false, wrap: true });
            aceEditor.on("change", () => {
                try {
                    const parsed = JSON.parse(aceEditor.getValue());
                    if (JSON.stringify(parsed) !== JSON.stringify(localData)) {
                        localData = parsed;
                        renderUI();
                    }
                } catch(e) {}
            });
        }

        // Cursor effect
        const glow = document.getElementById('cursor-glow');
        document.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        // Tab Navigation
        function setTab(tabId) {
            ['compose', 'database', 'raw'].forEach(t => {
                document.getElementById(`panel-${t}`).classList.add('hidden');
                document.getElementById(`tab-${t}`).className = "pb-4 text-xs font-black uppercase tracking-widest text-gray-500";
            });
            document.getElementById(`panel-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).className = "tab-active pb-4 text-xs font-black uppercase tracking-widest";
        }

        // Auth with better feedback
        async function showLogin() {
            const { value: pass } = await Swal.fire({
                title: 'ADMIN LOGIN',
                input: 'password',
                inputPlaceholder: 'Masukkan password...',
                background: '#080808',
                color: '#fff',
                confirmButtonColor: '#ff003c',
                confirmButtonText: 'MASUK',
                showLoaderOnConfirm: true,
                preConfirm: async (password) => {
                    try {
                        const response = await fetch(API_URL, { 
                            method: 'POST', 
                            body: JSON.stringify({ action: 'login', password: password }) 
                        });
                        if (!response.ok) throw new Error('Respons jaringan tidak stabil');
                        return await response.json();
                    } catch (error) {
                        Swal.showValidationMessage(`Koneksi Gagal: ${error}`);
                    }
                },
                allowOutsideClick: () => !Swal.isLoading()
            });

            if (pass && pass.success) {
                currentPass = pass.password || ""; // Biasanya password dikembalikan atau disimpan
                currentPass = pass.inputPassword || ""; // Placeholder jika server tidak mengembalikan pass
                // Gunakan input awal jika success
                loginSuccess(pass.password || ""); 
            } else if (pass) {
                Swal.fire('Akses Ditolak', 'Password salah atau sesi berakhir.', 'error');
            }
        }
        
        // Memisahkan logika login sukses untuk kejelasan
        function loginSuccess(password) {
            currentPass = password; // Simpan untuk sync nanti
            document.getElementById('publicView').classList.add('hidden');
            document.getElementById('adminView').classList.remove('hidden');
            document.getElementById('adminView').classList.add('opacity-100');
            document.getElementById('navActions').innerHTML = `<span class="text-[10px] text-red-500 font-bold uppercase tracking-widest">Koneksi Aman</span>`;
            fetchData();
        }

        // Tambahan: showLogin versi lama diperbaiki agar menangani currentPass dengan benar
        async function showLogin() {
            const { value: pass } = await Swal.fire({
                title: 'ADMIN LOGIN',
                input: 'password',
                background: '#080808',
                color: '#fff',
                confirmButtonColor: '#ff003c'
            });
            
            if(!pass) return;

            Swal.fire({ 
                title: 'Verifikasi Skrip...', 
                html: 'Membangunkan server Google (biasanya 5-10 detik)...',
                didOpen: () => Swal.showLoading(), 
                background: '#080808' 
            });

            try {
                const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'login', password: pass }) });
                const data = await res.json();
                if(data.success) {
                    currentPass = pass; // Simpan password asli untuk sync
                    Swal.close();
                    document.getElementById('publicView').classList.add('hidden');
                    document.getElementById('adminView').classList.remove('hidden');
                    setTimeout(() => document.getElementById('adminView').classList.add('opacity-100'), 50);
                    document.getElementById('navActions').innerHTML = `<span class="text-[10px] text-red-500 font-bold uppercase tracking-widest">Koneksi Aman</span>`;
                    fetchData();
                } else {
                    Swal.fire('Error', 'Password Salah', 'error');
                }
            } catch(e) { 
                Swal.fire('Error', 'Gagal terhubung ke Google Apps Script. Pastikan skrip sudah dideploy.', 'error'); 
            }
        }

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const result = await res.json();
                localData = result.data || [];
                aceEditor.setValue(JSON.stringify(localData, null, 4), -1);
                renderUI();
            } catch(e) { console.error(e); }
        }

        function renderUI() {
            const queue = document.getElementById('queueList');
            const grid = document.getElementById('dbGrid');

            queue.innerHTML = localData.map((item, i) => `
                <div class="flex justify-between items-center bg-black/40 p-4 rounded-xl border border-white/5 hover:border-red-600/30 transition-all group">
                    <div class="overflow-hidden">
                        <p class="text-xs font-bold text-white truncate uppercase">${item.title}</p>
                        <p class="text-[8px] font-mono text-gray-600 uppercase">${item.date || 'Lokal'}</p>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                        <button onclick="loadEdit(${i})" class="p-2 text-gray-400 hover:text-white">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button onclick="deleteEntry(${i})" class="p-2 text-gray-400 hover:text-red-500">
                            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
                        </button>
                    </div>
                </div>
            `).join('');

            grid.innerHTML = localData.map((item, i) => `
                <div class="bg-[#0c0c0c] p-8 rounded-2xl neon-border flex flex-col group h-full">
                    <div class="flex justify-between mb-4">
                        <span class="text-[9px] font-mono text-red-500 font-bold">${item.date || 'Menunggu Sync'}</span>
                        <span class="text-[8px] text-gray-700">#${i+1}</span>
                    </div>
                    <h3 class="text-lg font-black text-white mb-4 uppercase tracking-tighter">${item.title}</h3>
                    <div class="text-gray-400 text-xs leading-relaxed line-clamp-3 mb-6">${item.body}</div>
                    <div class="mt-auto pt-4 border-t border-white/5 flex justify-between items-center">
                        <button onclick="loadEdit(${i})" class="text-[9px] font-bold text-gray-500 hover:text-white uppercase transition-all">Edit Entri</button>
                        <button onclick="deleteEntry(${i})" class="text-[9px] font-bold text-red-600 uppercase hover:text-white transition-all">Hapus</button>
                    </div>
                </div>
            `).join('');
        }

        function saveEntry() {
            const title = document.getElementById('titleInput').value;
            const body = document.getElementById('bodyInput').value;
            const editIndex = parseInt(document.getElementById('editIndex').value);

            if(!title || !body) return;

            if(editIndex > -1) {
                localData[editIndex].title = title;
                localData[editIndex].body = body;
                cancelEdit();
            } else {
                const dateStr = new Date().toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric'}).toUpperCase();
                localData.unshift({ title, body, date: dateStr });
            }

            aceEditor.setValue(JSON.stringify(localData, null, 4), -1);
            document.getElementById('titleInput').value = "";
            document.getElementById('bodyInput').value = "";
            renderUI();
            
            Swal.fire({ toast:true, position:'top-end', icon:'success', title:'Antrian Diperbarui', showConfirmButton:false, timer:1500, background:'#111', color:'#fff' });
        }

        function loadEdit(index) {
            setTab('compose');
            const item = localData[index];
            document.getElementById('titleInput').value = item.title;
            document.getElementById('bodyInput').value = item.body;
            document.getElementById('editIndex').value = index;
            
            document.getElementById('formTitle').innerText = "Edit Entri Database";
            document.getElementById('submitBtn').innerText = "PERBARUI ENTRI";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
        }

        function cancelEdit() {
            document.getElementById('editIndex').value = "-1";
            document.getElementById('titleInput').value = "";
            document.getElementById('bodyInput').value = "";
            document.getElementById('formTitle').innerText = "Buat Entri Baru";
            document.getElementById('submitBtn').innerText = "SIMPAN KE ANTRIAN";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        function deleteEntry(i) {
            Swal.fire({
                title: 'Hapus Entri?',
                text: "Tindakan ini tidak bisa dibatalkan dari antrian lokal.",
                icon: 'warning',
                background: '#080808',
                color: '#fff',
                showCancelButton: true,
                confirmButtonColor: '#ff003c',
                cancelButtonColor: '#333'
            }).then((result) => {
                if (result.isConfirmed) {
                    localData.splice(i, 1);
                    aceEditor.setValue(JSON.stringify(localData, null, 4), -1);
                    renderUI();
                }
            });
        }

        async function syncToCloud() {
            Swal.fire({ title: 'Sinkronisasi Master...', didOpen: () => Swal.showLoading(), background: '#080808' });
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'update', password: currentPass, newData: localData })
                });
                const result = await res.json();
                if(result.success) Swal.fire('Berhasil', 'Database Cloud Terkini', 'success');
            } catch(e) { Swal.fire('Error', 'Gagal Sync. Coba relogin jika password expired.', 'error'); }
        }

        function copyRaw() {
            const val = aceEditor.getValue();
            const el = document.createElement('textarea');
            el.value = val;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            Swal.fire({ toast:true, position:'top-end', title:'JSON Disalin', showConfirmButton:false, timer:1000, background:'#111', color:'#fff' });
        }

        function logout() { location.reload(); }

        window.onload = () => { initEditor(); fetchData(); };
    </script>
</body>
</html>
