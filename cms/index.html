<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muhardian Pro Content Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.23.0/ace.js"></script>
    <style>
        :root {
            --neon-red: #ff003c;
            --deep-black: #050505;
            --charcoal: #0f0f0f;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-black);
            color: #eee;
            scroll-behavior: smooth;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Gradient Background */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 0, 60, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 60, 0.05) 0%, transparent 40%);
            z-index: -2;
            animation: moveGradient 15s ease infinite alternate;
        }

        @keyframes moveGradient {
            from { transform: scale(1) translate(0, 0); }
            to { transform: scale(1.2) translate(5%, 5%); }
        }

        /* Mouse Follow Effect (Spotlight) */
        #cursor-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 0, 60, 0.08) 0%, rgba(255, 0, 60, 0.03) 30%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: -1;
            transition: width 0.3s, height 0.3s;
        }

        .neon-text {
            color: var(--neon-red);
            text-shadow: 0 0 10px rgba(255, 0, 60, 0.5);
        }

        .neon-border {
            border: 1px solid rgba(255, 0, 60, 0.2);
            transition: all 0.3s ease;
            background: rgba(15, 15, 15, 0.4);
        }

        .neon-border:hover {
            border-color: var(--neon-red);
            box-shadow: 0 0 25px rgba(255, 0, 60, 0.15);
            background: rgba(15, 15, 15, 0.7);
        }

        .neon-button {
            background: transparent;
            border: 1px solid var(--neon-red);
            color: var(--neon-red);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .neon-button:hover {
            background: var(--neon-red);
            color: white;
            box-shadow: 0 0 30px var(--neon-red);
            transform: translateY(-2px);
        }

        .glass {
            background: rgba(5, 5, 5, 0.7);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }

        #editor {
            height: 250px;
            width: 100%;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }

        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }

        .card-anim {
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-red); }

        .read-more-modal {
            background: var(--charcoal) !important;
            color: #eee !important;
            border: 1px solid var(--neon-red) !important;
            text-align: left !important;
            border-radius: 20px !important;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- Cursor Glow Effect -->
    <div id="cursor-glow"></div>

    <nav class="p-6 flex justify-between items-center glass sticky top-0 z-50">
        <h1 class="text-xl font-extrabold tracking-tighter neon-text">MUHARDIAN<span class="text-white">.PRO</span></h1>
        <button onclick="showLoginPopup()" id="adminBtn" class="neon-button px-5 py-2 rounded text-xs">Admin Access</button>
    </nav>

    <main class="flex-grow container mx-auto px-6 py-12">
        
        <!-- Visitor View (Grid Konten) -->
        <div id="visitorSection">
            <header class="mb-16 text-center">
                <span class="text-[10px] text-red-500 font-mono tracking-[0.6em] uppercase mb-4 block">Secure Database Interface</span>
                <h2 class="text-4xl md:text-6xl font-black mb-6 tracking-tighter italic">MERAH <span class="neon-text">PUTIH</span></h2>
                <div class="h-[2px] w-12 bg-red-600 mx-auto rounded-full"></div>
            </header>

            <div id="loading" class="text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-t-2 border-red-600"></div>
                <p class="mt-4 text-gray-500 font-mono text-xs uppercase tracking-widest">Synchronizing...</p>
            </div>

            <div id="contentGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
                <!-- Data akan muncul di sini -->
            </div>
        </div>

        <!-- Admin View -->
        <div id="adminSection" class="hidden max-w-6xl mx-auto opacity-0 transition-all duration-700">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 border-b border-white/5 pb-6 gap-4">
                <div>
                    <h3 class="text-4xl font-black neon-text italic">ADMIN CONTROL</h3>
                    <p class="text-gray-500 text-xs font-mono tracking-widest uppercase">LOGGED IN AS: ADMINISTRATOR</p>
                </div>
                <!-- Tombol Terminate Session diperbarui -->
                <button onclick="logout()" class="neon-button px-6 py-3 rounded-xl flex items-center gap-3 group whitespace-nowrap">
                    <span class="text-[10px] font-black">TERMINATE SESSION</span>
                    <svg class="group-hover:-translate-x-1 transition-transform" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-10">
                <!-- Form Input -->
                <div class="lg:col-span-1 space-y-8">
                    <div class="glass p-8 rounded-2xl neon-border">
                        <h4 class="text-xs font-black text-white mb-6 uppercase tracking-[0.2em] flex items-center gap-2">
                            <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span>
                            New Entry
                        </h4>
                        <div class="space-y-5">
                            <div>
                                <label class="text-[9px] text-gray-500 uppercase font-bold block mb-2 tracking-widest">Entry Title</label>
                                <input type="text" id="postTitle" placeholder="Ketik judul..." class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-sm focus:border-red-600 outline-none transition-all placeholder:text-gray-800">
                            </div>
                            <div>
                                <label class="text-[9px] text-gray-500 uppercase font-bold block mb-2 tracking-widest">Entry Body</label>
                                <textarea id="postBody" rows="5" placeholder="Ketik isi konten..." class="w-full bg-black/50 border border-white/10 rounded-lg p-3 text-sm focus:border-red-600 outline-none transition-all placeholder:text-gray-800"></textarea>
                            </div>
                            <button onclick="addNewPost()" class="w-full neon-button py-4 rounded-lg text-xs mt-4">Queue Data</button>
                        </div>
                    </div>
                </div>

                <!-- List Manager & Editor JSON -->
                <div class="lg:col-span-2 space-y-8">
                    <!-- Delete Manager -->
                    <div class="glass p-6 rounded-2xl neon-border">
                        <h4 class="text-[10px] font-black text-gray-500 mb-6 uppercase tracking-[0.2em]">Manage Current Entries</h4>
                        <div id="adminEntryList" class="space-y-3 max-h-[300px] overflow-y-auto custom-scroll pr-2">
                            <!-- Items will appear here -->
                        </div>
                    </div>

                    <!-- JSON Editor -->
                    <div class="rounded-2xl overflow-hidden neon-border">
                        <div class="bg-[#1a1a1a] p-4 flex justify-between items-center border-b border-white/5">
                            <span class="text-[9px] font-mono text-gray-500 uppercase tracking-widest">Raw_Data_Source.json</span>
                            <div class="flex gap-2">
                                <div class="w-2 h-2 rounded-full bg-white/5"></div>
                                <div class="w-2 h-2 rounded-full bg-white/5"></div>
                            </div>
                        </div>
                        <div id="editor"></div>
                    </div>

                    <div class="mt-6 flex justify-end">
                        <button onclick="handleUpdate()" class="neon-button px-12 py-5 rounded-xl flex items-center gap-4 group">
                            <span class="text-xs font-black">COMMIT CHANGES TO SERVER</span>
                            <svg class="group-hover:translate-x-1 transition-transform" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="p-12 text-center border-t border-white/5 bg-black/80 backdrop-blur-md mt-20">
        <div class="mb-4 flex justify-center gap-6">
            <div class="h-px w-8 bg-white/10 self-center"></div>
            <p class="text-gray-600 text-[9px] tracking-[0.5em] uppercase font-bold">Muhardian Pro Systems</p>
            <div class="h-px w-8 bg-white/10 self-center"></div>
        </div>
        <p class="text-gray-800 text-[8px] font-mono uppercase tracking-widest">Terminal Build 2026.4.1</p>
    </footer>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycby5MY97s2zr5pFXB8H8pvzD4LY3lMcy9GwY2_-YeKffk-hye2Mq-B81QQNIBAWKcH9i/exec";
        
        let currentPassword = "";
        let aceEditor;
        let localData = [];

        // Mouse Spotlight Effect
        const glow = document.getElementById('cursor-glow');
        window.addEventListener('mousemove', (e) => {
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });

        function initEditor() {
            aceEditor = ace.edit("editor");
            aceEditor.setTheme("ace/theme/tomorrow_night_eighties");
            aceEditor.session.setMode("ace/mode/json");
            aceEditor.setOptions({
                showPrintMargin: false,
                highlightActiveLine: true,
                wrap: true,
                useWorker: false
            });
            aceEditor.renderer.setScrollMargin(10, 10);
            
            // Sync manual changes from editor back to localData
            aceEditor.on("change", () => {
                try {
                    const content = aceEditor.getValue();
                    if (content.trim()) {
                        localData = JSON.parse(content);
                        renderAdminEntryList();
                    }
                } catch(e) {}
            });
        }

        async function fetchContent() {
            document.getElementById('loading').classList.remove('hidden');
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                localData = result.data || [];
                renderVisitorGrid();
                renderAdminEntryList();
                if (aceEditor) aceEditor.setValue(JSON.stringify(localData, null, 4), -1);
            } catch (error) {
                console.error("Fetch error:", error);
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        function renderVisitorGrid() {
            const grid = document.getElementById('contentGrid');
            grid.innerHTML = "";
            
            if (localData.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center text-gray-600 py-10 italic">Tidak ada transmisi data terdeteksi.</div>`;
                return;
            }

            localData.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = `glass p-10 rounded-3xl neon-border card-anim flex flex-col group`;
                card.style.animationDelay = `${index * 0.1}s`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <div class="flex flex-col">
                            <span class="text-[9px] font-mono text-red-600 uppercase tracking-[0.3em] font-black">${item.date || 'UNSET'}</span>
                            <div class="h-[2px] w-4 bg-red-600 mt-1 transition-all group-hover:w-8"></div>
                        </div>
                        <span class="text-[8px] text-gray-700 font-mono italic">#${String(index + 1).padStart(3, '0')}</span>
                    </div>
                    <h3 class="text-2xl font-black mb-5 text-white tracking-tight leading-none group-hover:neon-text transition-all">${item.title}</h3>
                    <div class="text-gray-400 text-sm leading-relaxed mb-6 line-clamp-3 font-medium">
                        ${item.body}
                    </div>
                    <div class="mt-auto">
                        <button onclick="readFullContent(${index})" class="group/btn inline-flex items-center gap-2 text-[9px] font-black text-red-600 hover:text-white uppercase tracking-[0.2em] transition-all">
                            <span>Expand Entry</span>
                            <svg class="group-hover/btn:translate-x-1 transition-transform" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function renderAdminEntryList() {
            const listContainer = document.getElementById('adminEntryList');
            if (!listContainer) return;
            
            listContainer.innerHTML = "";
            localData.forEach((item, index) => {
                const itemEl = document.createElement('div');
                itemEl.className = "flex items-center justify-between bg-black/40 p-4 rounded-xl border border-white/5 hover:border-red-600/30 transition-all";
                itemEl.innerHTML = `
                    <div class="flex flex-col overflow-hidden mr-4">
                        <span class="text-[11px] font-bold text-white truncate uppercase tracking-tight">${item.title}</span>
                        <span class="text-[8px] font-mono text-gray-600 uppercase">${item.date}</span>
                    </div>
                    <button onclick="deleteEntry(${index})" class="p-2 hover:bg-red-600/10 rounded-lg text-gray-600 hover:text-red-500 transition-all">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18m-2 0v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6m3 0V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
                    </button>
                `;
                listContainer.appendChild(itemEl);
            });
        }

        function deleteEntry(index) {
            Swal.fire({
                title: 'Hapus Konten?',
                text: `Entry "${localData[index].title}" akan dihapus dari antrean lokal.`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ff003c',
                cancelButtonColor: '#1a1a1a',
                confirmButtonText: 'Ya, Hapus!',
                background: '#0a0a0a',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed) {
                    localData.splice(index, 1);
                    aceEditor.setValue(JSON.stringify(localData, null, 4), -1);
                    renderAdminEntryList();
                    Swal.fire({
                        toast: true,
                        position: 'top-end',
                        icon: 'info',
                        title: 'Dihapus dari antrean. Ingat untuk Commit!',
                        showConfirmButton: false,
                        timer: 2000,
                        background: '#121212',
                        color: '#fff'
                    });
                }
            });
        }

        function readFullContent(index) {
            const item = localData[index];
            Swal.fire({
                title: `<span class="neon-text text-2xl font-black italic tracking-tighter uppercase">${item.title}</span>`,
                html: `
                    <div class="text-left py-6">
                        <div class="flex items-center justify-between mb-6 border-b border-white/5 pb-2">
                             <p class="text-[9px] font-mono text-gray-500 uppercase tracking-widest font-bold">${item.date}</p>
                             <p class="text-[9px] font-mono text-red-600 uppercase">Status: Finalized</p>
                        </div>
                        <div class="text-sm leading-relaxed text-gray-300 overflow-y-auto max-h-[50vh] pr-4 custom-scroll">
                            ${item.body.replace(/\n/g, '<br>')}
                        </div>
                    </div>
                `,
                showConfirmButton: false,
                showCloseButton: true,
                customClass: { popup: 'read-more-modal' },
                background: '#0a0a0a',
                color: '#eee'
            });
        }

        function addNewPost() {
            const title = document.getElementById('postTitle').value;
            const body = document.getElementById('postBody').value;
            const date = new Date().toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }).toUpperCase();

            if (!title || !body) {
                return Swal.fire({ title: 'Validation Failed', text: 'Data tidak boleh kosong!', icon: 'warning', background: '#0a0a0a', color: '#fff' });
            }

            const newPost = { title, body, date };
            localData.unshift(newPost);
            aceEditor.setValue(JSON.stringify(localData, null, 4), -1);
            renderAdminEntryList();
            document.getElementById('postTitle').value = "";
            document.getElementById('postBody').value = "";
            
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: 'Ditambahkan ke antrean.',
                showConfirmButton: false,
                timer: 2000,
                background: '#121212',
                color: '#fff'
            });
        }

        async function showLoginPopup() {
            const { value: password } = await Swal.fire({
                title: 'TERMINAL LOGIN',
                text: 'Authentication required for root access',
                input: 'password',
                inputPlaceholder: 'Enter Security Hash',
                confirmButtonColor: '#ff003c',
                confirmButtonText: 'Initialize',
                background: '#050505',
                color: '#fff',
                customClass: { popup: 'neon-border' }
            });
            if (password) verifyLogin(password);
        }

        async function verifyLogin(password) {
            Swal.fire({ title: 'Decrypting Sockets...', didOpen: () => Swal.showLoading(), background: '#050505', color: '#fff' });
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', password: password })
                });
                const result = await response.json();
                if (result.success) {
                    currentPassword = password;
                    const adminSec = document.getElementById('adminSection');
                    document.getElementById('visitorSection').classList.add('hidden');
                    adminSec.classList.remove('hidden');
                    setTimeout(() => adminSec.classList.add('opacity-100'), 50);
                    document.getElementById('adminBtn').classList.add('hidden');
                    Swal.close();
                } else {
                    Swal.fire({ title: 'Access Denied', text: 'Hash mismatch!', icon: 'error', background: '#050505', color: '#fff' });
                }
            } catch (e) { Swal.fire('Critical Error', 'Database unreachable.', 'error'); }
        }

        async function handleUpdate() {
            let updatedData;
            try {
                updatedData = JSON.parse(aceEditor.getValue());
            } catch (e) {
                return Swal.fire('JSON Error', 'Struktur data korup!', 'error');
            }

            Swal.fire({ title: 'Deploying To Server...', didOpen: () => Swal.showLoading(), background: '#050505', color: '#fff' });

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: 'update', 
                        password: currentPassword, 
                        newData: updatedData 
                    })
                });
                const result = await response.json();
                if (result.success) {
                    localData = updatedData;
                    renderVisitorGrid();
                    renderAdminEntryList();
                    Swal.fire({ title: 'Deployment Success', text: 'Data has been synchronized.', icon: 'success', background: '#050505', color: '#fff' });
                }
            } catch (e) { Swal.fire('Deploy Failed', 'Koneksi terputus.', 'error'); }
        }

        function logout() {
            location.reload();
        }

        window.onload = () => {
            initEditor();
            fetchContent();
        };
    </script>
</body>
</html>
